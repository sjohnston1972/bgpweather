name = "bgp-weather"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Custom domain — must sit above the first [table] or TOML files it under that table.
routes = [
  { pattern = "bgpweather.clydeford.net", custom_domain = true }
]

# Dashboard files in public/ are served directly; anything else falls through to the Worker.
[assets]
directory = "public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "WATCHER"
class_name = "Watcher"

[[durable_objects.bindings]]
name = "LATENCY"
class_name = "LatencyWatcher"

# SQLite-backed DO classes — required for the free plan and the modern default.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Watcher"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["LatencyWatcher"]

[[d1_databases]]
binding = "DB"
database_name = "bgp-weather"
database_id = "b6f449b4-0383-4167-aa27-ddc158ce2b37"

[triggers]
# 1) watchdog ping so the DO reconnects if evicted, 2) hourly calm summary, 3) daily D1 cleanup
crons = ["*/5 * * * *", "0 * * * *", "30 3 * * *"]

[vars]
NARRATION_ENABLED = "true"

[observability]
enabled = true
